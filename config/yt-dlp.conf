# ─────────────────────────────────────────────────────────────
# rekordbox-safe yt-dlp config
# Read automatically when yt-dlp is invoked as:  yt-dlp -P ~/Music/DJ ...
#
# Deliberately NOT ~/.config/yt-dlp/config — a global config containing "-x"
# silently breaks every video download you ever attempt.
#
# ONLY single-argument options live here. yt-dlp's config parser strips
# backslashes and does not require an explicit trailing argument, so a
# multi-arg option like `--replace-in-metadata FIELD REGEX REPLACEMENT`
# will eat the following line as its missing argument. Those rules live in
# the `djdl` script instead, where shell quoting makes them unambiguous.
# ─────────────────────────────────────────────────────────────

# --- Source selection ---------------------------------------
# Prefer Opus (itag 251, ~160k VBR) over AAC (itag 140, 128k CBR).
-f bestaudio[ext=webm]/bestaudio/best

# --- Format: the keystone rule ------------------------------
#   webm (Opus)     -> FLAC   one decode, NO re-encode
#   everything else -> best   stream copy, untouched (m4a, SoundCloud mp3)
# Net effect: never emits Opus/Ogg, which rekordbox cannot import.
-x
--audio-format webm>flac/best

# --- Metadata (simple flags only; regex chain is in djdl) ----
--embed-metadata
--no-embed-info-json
--embed-thumbnail
--convert-thumbnails jpg

# --- Output -------------------------------------------------
# MUST be quoted: the config parser splits on whitespace, so an unquoted
# template containing " - " silently truncates and the remainder is parsed
# as extra URLs.
-o "Incoming/%(artist,creator,uploader)s - %(title)s.%(ext)s"
--no-overwrites

# NOTE: --download-archive is deliberately NOT here. -P applies to output
# paths but NOT to the archive, so a relative path here resolves against the
# current working directory and litters .archive.txt wherever you happen to
# be standing. djdl passes it as an absolute path instead.

# mtime = download time, so rekordbox "Date Added" sorting is meaningful.
--no-mtime

# --- Politeness / resilience --------------------------------
# --sleep-requests matters far more than --limit-rate: bot detection keys on
# request patterns during metadata extraction, not on bandwidth.
--sleep-requests 1.5
--sleep-interval 3
--max-sleep-interval 8
--throttled-rate 100K
--retries 10
--fragment-retries 10
--concurrent-fragments 1
--ignore-errors
